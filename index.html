<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class=" h-screen bg-gray-900 flex justify-center items-center"> 
    <main class="flex flex-col w-[80vw] h-[80vw] items-center">
        <section id="top" class="flex items-center flex-col gap-7"> 
            <h1 class="text-white text-5xl uppercase">Cadastrar Nome</h1>
            <input type="text" placeholder="Nome" class="w-[280px] bg-white px-3 py-1 border-[2px] rounded-[5px]" id="nome">
            <input type="submit" value="confimar" class="w-[150px] bg-white px-3 py-1 border-[2px] rounded-[5px] mb-7" onclick="salvarNome()">
        </section>

        <section class="bg-gray-950 w-[50vw] py-3 rounded-[7px]">
            <div id="saida" class="flex justify-center gap-3 items-center flex-col text-white font-bold">
                <div id="linha"></div>
            </div>
        </section>
    </main>
</body>
</html>
